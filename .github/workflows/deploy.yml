name: Deploy using Github Acionts

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.IP }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key \
            "${{ secrets.USER }}@${{ secrets.IP }}" << 'EOF'
              set -e

              cd ~/test-260708

              git pull origin main
              npm ci
              npm run build

              pm2 restart next-app
          EOF